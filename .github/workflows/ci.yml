name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Test and package
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Build with Maven
        run: |
          chmod +x mvnw
          ./mvnw -B package

      - name: Build Docker image
        run: docker build -t laptopshop:ci .

      - name: Upload WAR artifact
        uses: actions/upload-artifact@v7
        with:
          name: laptopshop-war
          path: target/*.war
